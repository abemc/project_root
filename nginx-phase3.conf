user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    # Upstream backends
    upstream prod_stable_backend {
        server app-prod-stable:8501 max_fails=3 fail_timeout=30s;
    }

    upstream staging_backend {
        server app-staging:8501 max_fails=3 fail_timeout=30s;
    }

    # Split traffic using split_clients (75% prod, 25% staging)
    split_clients $remote_addr$remote_port$time_iso8601 $backend {
        75% "prod";
        25% "staging";
    }

    # Health check endpoint
    server {
        listen 80;
        server_name localhost;
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }

    # Main server with traffic split
    server {
        listen 80 default_server;
        server_name _;

        location / {
            set $backend_address "";
            set $stage_name "";
            
            # Route based on split_clients result
            if ($backend = "prod") {
                set $backend_address "http://prod_stable_backend";
                set $stage_name "prod-stable";
            }
            if ($backend = "staging") {
                set $backend_address "http://staging_backend";
                set $stage_name "staging";
            }

            proxy_pass $backend_address;
            add_header X-Deployment-Stage $stage_name;
            add_header X-Phase-3 true;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
            proxy_buffering off;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Metrics endpoint
        location /metrics {
            proxy_pass http://prod_stable_backend;
            access_log off;
        }

        # Health check
        location /healthz {
            access_log off;
            if ($backend = "staging") {
                proxy_pass http://staging_backend;
            }
            if ($backend = "prod") {
                proxy_pass http://prod_stable_backend;
            }
        }
    }
}
