# Redis クラスタセットアップ

## ステップ 1: docker-compose に Redis を追加

version: '3.8'

services:
  # ... 既存のサービス ...

  redis-master:
    image: redis:7.2-alpine
    container_name: esp-redis-master
    ports:
      - "6379:6379"
    command: >
      redis-server --requirepass ${REDIS_PASSWORD}
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis-master-data:/data
    networks:
      - esp-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}

  redis-replica-1:
    image: redis:7.2-alpine
    container_name: esp-redis-replica-1
    ports:
      - "6380:6379"
    command: >
      redis-server --requirepass ${REDIS_PASSWORD}
      --masterauth ${REDIS_PASSWORD}
      --replicaof redis-master 6379
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis-replica1-data:/data
    networks:
      - esp-network
    depends_on:
      - redis-master
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}

  redis-replica-2:
    image: redis:7.2-alpine
    container_name: esp-redis-replica-2
    ports:
      - "6381:6379"
    command: >
      redis-server --requirepass ${REDIS_PASSWORD}
      --masterauth ${REDIS_PASSWORD}
      --replicaof redis-master 6379
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis-replica2-data:/data
    networks:
      - esp-network
    depends_on:
      - redis-master
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}

  redis-sentinel-1:
    image: redis:7.2-alpine
    container_name: esp-redis-sentinel-1
    ports:
      - "26379:26379"
    command: redis-sentinel /etc/sentinel/sentinel-1.conf
    volumes:
      - ./config/sentinel-1.conf:/etc/sentinel/sentinel-1.conf
      - sentinel-1-data:/data
    networks:
      - esp-network
    depends_on:
      - redis-master
      - redis-replica-1
      - redis-replica-2

  redis-sentinel-2:
    image: redis:7.2-alpine
    container_name: esp-redis-sentinel-2
    ports:
      - "26380:26379"
    command: redis-sentinel /etc/sentinel/sentinel-2.conf
    volumes:
      - ./config/sentinel-2.conf:/etc/sentinel/sentinel-2.conf
      - sentinel-2-data:/data
    networks:
      - esp-network
    depends_on:
      - redis-master
      - redis-replica-1
      - redis-replica-2

  redis-sentinel-3:
    image: redis:7.2-alpine
    container_name: esp-redis-sentinel-3
    ports:
      - "26381:26379"
    command: redis-sentinel /etc/sentinel/sentinel-3.conf
    volumes:
      - ./config/sentinel-3.conf:/etc/sentinel/sentinel-3.conf
      - sentinel-3-data:/data
    networks:
      - esp-network
    depends_on:
      - redis-master
      - redis-replica-1
      - redis-replica-2

volumes:
  redis-master-data:
  redis-replica1-data:
  redis-replica2-data:
  sentinel-1-data:
  sentinel-2-data:
  sentinel-3-data:

networks:
  esp-network:
    driver: bridge
