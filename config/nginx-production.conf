user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    log_format timing '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $request_time $upstream_response_time '
                      'cache:$upstream_cache_status';

    access_log /var/log/nginx/access.log main;
    access_log /var/log/nginx/timing.log timing;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 100M;

    # Connection pooling
    upstream_keepalive_connections 32;
    upstream_keepalive_timeout 60s;
    upstream_keepalive_requests 100;

    # Rate limiting setup
    limit_req_zone $binary_remote_addr zone=general:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=api:10m rate=1000r/s;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/x-javascript application/xml+rss 
               application/json application/javascript;

    # Cache for static content
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=cache:10m 
                    max_size=1g inactive=60m use_temp_path=off;

    # Upstream backends
    upstream production_backend {
        # Production instances (Phase 4)
        server rag-agent-app-prod-1:8501 max_fails=3 fail_timeout=30s weight=50;
        server rag-agent-app-prod-2:8501 max_fails=3 fail_timeout=30s weight=50;
        keepalive 32;
    }

    # Server block for production
    server {
        listen 80 default_server;
        listen [::]:80 default_server;

        server_name _;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Performance headers
        add_header Cache-Control "public, max-age=3600" always;
        add_header Vary "Accept-Encoding" always;

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # Health check for upstream
        location /upstream/health {
            access_log off;
            proxy_pass http://production_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_connect_timeout 5s;
            proxy_read_timeout 5s;
        }

        # Metrics and monitoring
        location /metrics {
            access_log off;
            proxy_pass http://production_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_request_buffering off;
        }

        # Main application - 100% traffic to production
        location / {
            limit_req zone=general burst=10 nodelay;

            proxy_pass http://production_backend;
            proxy_http_version 1.1;

            # Connection handling
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $server_name;
            proxy_set_header X-Request-ID $request_id;

            # Upgrade headers for WebSocket
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Timeouts for production
            proxy_connect_timeout 5s;
            proxy_send_timeout 30s;
            proxy_read_timeout 60s;

            # Buffering for streaming
            proxy_buffering off;
            proxy_request_buffering off;

            # Error handling
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;
            proxy_next_upstream_tries 2;
            proxy_next_upstream_timeout 10s;
        }

        # Deny other locations
        location ~ /\. {
            deny all;
            access_log off;
        }

        # Deny configuration files
        location ~ /\.git {
            deny all;
        }

        location ~ /\.env {
            deny all;
        }
    }

    # Redirect HTTP to HTTPS (if needed in future)
    # Uncomment when SSL is configured
    # server {
    #     listen 80;
    #     listen [::]:80;
    #     server_name _;
    #     return 301 https://$host$request_uri;
    # }
}
