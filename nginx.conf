user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    # Upstream backends
    upstream prod_backend {
        server app-prod:8501 max_fails=3 fail_timeout=30s;
    }

    upstream canary_backend {
        server app-canary:8501 max_fails=3 fail_timeout=30s;
    }

    # Health check endpoint
    server {
        listen 80;
        server_name localhost;
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }

    # Main server with traffic split (95% prod, 5% canary)
    server {
        listen 80 default_server;
        server_name _;

        # Split traffic: 95% to prod, 5% to canary
        set $backend_pool "prod";
        if ($remote_addr ~ "^10\.0\.0\.[5-9]$|^10\.0\.0\.1[0-9]$") {
            set $backend_pool "canary";
        }

        # Based on request count (simplified for demo)
        set $canary_pool 0;
        if ($msec ~ ".*[05]$") {
            set $canary_pool 1;
        }

        location / {
            if ($canary_pool = 1) {
                proxy_pass http://canary_backend;
                add_header X-Deployment-Stage canary;
            }
            if ($canary_pool = 0) {
                proxy_pass http://prod_backend;
                add_header X-Deployment-Stage prod;
            }

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
            proxy_buffering off;
        }

        # Metrics endpoint
        location /metrics {
            proxy_pass http://prod_backend/metrics;
            access_log off;
        }
    }
}
