user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    # Upstream backend - 100% production
    upstream production_backend {
        server app-production:8501 max_fails=5 fail_timeout=60s;
    }

    # Health check endpoint
    server {
        listen 80;
        server_name localhost;
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }

    # Main server - 100% production traffic
    server {
        listen 80 default_server;
        server_name _;

        location / {
            proxy_pass http://production_backend;
            add_header X-Deployment-Stage production;
            add_header X-Phase-4 true;
            add_header X-Traffic-Percentage 100%;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
            proxy_buffering off;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Metrics endpoint
        location /metrics {
            proxy_pass http://production_backend;
            access_log off;
        }

        # Health check
        location /healthz {
            access_log off;
            proxy_pass http://production_backend;
        }

        # Status page
        location /phase4-status {
            access_log off;
            return 200 "Phase 4 Production Deployment - 100% Traffic\nStatus: LIVE\nTimestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)\n";
            add_header Content-Type text/plain;
        }
    }
}
