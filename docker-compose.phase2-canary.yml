services:
  # Load Balancer (Nginx) - 5% traffic to canary
  nginx:
    image: nginx:alpine
    container_name: rag-agent-loadbalancer
    ports:
      - "8500:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app-prod
      - app-canary
    networks:
      - rag-network-prod
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Production Instance (95% traffic)
  app-prod:
    image: mcr.microsoft.com/devcontainers/python:3.10
    container_name: rag-agent-app-prod-primary
    ports:
      - "8505:8501"
    volumes:
      - .:/app
    working_dir: /app
    environment:
      - APP_ENV=production
      - DEPLOYMENT_STAGE=prod
      - PYTHONUNBUFFERED=1
    command: bash -c "pip install -q -r requirements.txt && streamlit run app.py --server.port=8501 --server.headless=true"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - rag-network-prod

  # Canary Instance (5% traffic)
  app-canary:
    image: mcr.microsoft.com/devcontainers/python:3.10
    container_name: rag-agent-app-canary
    ports:
      - "8506:8501"
    volumes:
      - .:/app
    working_dir: /app
    environment:
      - APP_ENV=production
      - DEPLOYMENT_STAGE=canary
      - PYTHONUNBUFFERED=1
    command: bash -c "pip install -q -r requirements.txt && streamlit run app.py --server.port=8501 --server.headless=true"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - rag-network-prod

  # Prometheus (monitoring)
  prometheus:
    image: prom/prometheus:latest
    container_name: rag-agent-prometheus-canary
    ports:
      - "9091:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - rag-network-prod

networks:
  rag-network-prod:
    driver: bridge

volumes:
  prometheus_data:
